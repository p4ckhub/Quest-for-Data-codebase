id: awakening-101
kind: program
zone: character_creation
act: 1
title: "Awakening the Champion"
concept: main_function
concepts_required: [main_function, cout]

teaching: |
  In this realm, will becomes word through a *cast* — a single spoken line.
  Every cast of the voice takes the same shape:

  ```cpp
  std::cout << "The gate stands open." << std::endl;
  ```

  Read it as the ancients did: `std::cout` is your voice. `<<` is the channel
  that carries what follows out into the world. Words travel held in quotes —
  `"like this"` — so the realm knows where speech begins and ends. `std::endl`
  is the breath that ends the utterance. And every cast is sealed with `;` —
  an unsealed cast is no cast at all.

narrative: |
  The Chamber of Awakening awaits your first words. As {{class_name}},
  your opening greeting sets the tone for all who hear it. Use std::cout
  to make your mark.

objective: |
  In main(), use std::cout to print a personalized greeting that includes
  the class name. Example output: "As a {{class_name}}, I enter the fray!"

prelude: |
    #include "gameapi.h"
    #include <iostream>
    int main() {

starter_code: |
        // TODO: Use std::cout to greet the world

epilogue: |
            gameapi::report("status", "awakened");
            return 0;
            }

solution: |
            std::cout << "As a {{class_name}}, I enter the fray!" << std::endl;

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: check_equals, id: status, expected: "awakened" }

hints:
  - trigger: "error:undeclared_identifier"
    message: "{{class_name}} is not a valid identifier here — use class data from classes.json"
  - trigger: "error:missing_semicolon"
    message: "Each incantation must end with ';'"
  - trigger: "attempt:6"
    message: 'Use std::cout << "text" << std::endl; to speak your first words'

rewards:
  xp: 50
  unlocks_zone_progress: true