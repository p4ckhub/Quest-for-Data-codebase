id: rites-of-order
kind: program
zone: character_creation
act: 1
title: "The Rites of Order"
concept: statements_and_structure
concepts_required: [main_function]

teaching: |
  A program is a rite of deeds performed in strict order. Each deed is
  a *statement*: the smallest thing the realm can be asked to do. Every
  statement is sealed with a semicolon, and one unsealed statement
  stops the whole rite before it begins.

  ```cpp
  #include <iostream>

  int main() {
      std::cout << "First." << std::endl;
      std::cout << "Second." << std::endl;
      return 0;
  }
  ```

  Every quest begins at `main()`. The realm finds that name, steps
  through the opening brace `{`, performs each statement from top to
  bottom, and leaves at the closing brace `}`. Nothing runs before
  main. Nothing runs outside its braces. And order is everything: the
  realm does exactly what is written, in exactly the order written.

  When a statement is malformed, the realm refuses the whole scroll
  and tells you why. The refusal is not punishment. It is the realm
  reading your scroll back to you, and it names the place and the
  problem more honestly than any oracle. Learn to read refusals early.

examples:
  - prompt: "Order is meaning. These two scrolls contain the same deeds and tell different stories:"
    code: |
      std::cout << "The door opens." << std::endl;
      std::cout << "The knock comes." << std::endl;

narrative: |
  You stand before the Gate of the Realm, where every champion's story
  begins. The gatekeeper hands you a scroll that is almost complete:
  two proclamations out of order, and one seal missing. The gate does
  not open for a malformed rite.

objective: |
  Cast the scroll as written and read the realm's refusal. Then mend
  it: seal the unsealed statement with a semicolon, and reorder the
  two proclamations so the first line spoken is "The realm stirs." and
  the second is "A challenger arrives."

starter_code: |
  #include <iostream>

  int main() {
      // [carved by the realm] The rite demands this proclamation, in this order:
      //   The realm stirs.
      //   A challenger arrives.
      std::cout << "A challenger arrives." << std::endl;
      std::cout << "The realm stirs." << std::endl
      return 0;
  }

solution: |
  #include <iostream>

  int main() {
      // [carved by the realm] The rite demands this proclamation, in this order:
      //   The realm stirs.
      //   A challenger arrives.
      std::cout << "The realm stirs." << std::endl;
      std::cout << "A challenger arrives." << std::endl;
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_matches, id: proclamation, regex: "The realm stirs\\.\\nA challenger arrives\\." }

hints:
  - trigger: "error:missing_semicolon"
    message: "The refusal names the line where a seal is missing. Read it, then end that statement with ';'."
  - trigger: "check_failed:proclamation"
    message: "The realm performs deeds top to bottom. The stirring must be spoken before the challenger is announced. Swap the two casts."
  - trigger: "attempt:6"
    message: "Two mendings: add the missing ';' after the second cast, then swap the two cast lines so the realm stirs first."

rewards:
  xp: 50
  unlocks_zone_progress: true
