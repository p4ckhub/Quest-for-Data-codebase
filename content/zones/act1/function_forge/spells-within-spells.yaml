id: spells-within-spells
kind: program
zone: function_forge
act: 1
title: "Spells Within Spells"
concept: function_composition
concepts_required: [main_function, functions_basics, composition]

teaching: |
  Here is the Forge's deepest secret, and it is quiet: a spell may
  *cast another spell*. Speak a forged name inside a working, and
  its yield flows in like any other value:

  ```cpp
  int spark() {
      return 2;
  }

  int blaze() {
      return spark() * 3;   // casts spark, then triples its yield
  }
  ```

  When blaze is cast, it casts spark in turn, receives 2, and yields
  6. This is how every great working in the realm is truly built —
  not as one enormous forging, but as small spells, each honest and
  simple, composed into greater ones. Forge small. Compose upward.

examples:
  - prompt: "A yield may also be caught in a crystal first, then worked:"
    code: |
      int rally() {
          int base = spark();
          return base + base;
      }

narrative: |
  The Forge-master lays two empty molds before you. "One small, one
  great. The small spell knows one thing: the base force of a
  {{class_name}}'s arm. The great spell knows nothing of forces — it
  only knows to cast the small one and add the Forge's blessing of
  six. Change the small spell someday, and the great one follows
  without being touched. That is the whole art."

objective: |
  Forge two spells: base_force, taking nothing and returning 4; and
  empowered, taking nothing and returning base_force() + 6. The great
  spell must CAST the small one — the Keeper reads your scroll and
  will know if you merely wrote 10.

starter_code: |
    // TODO: Bring in the tool that lets you speak to the realm.
    // TODO: Forge int base_force() returning the value the objective names.
    // TODO: Forge int empowered() that returns base_force() plus the objective's amount -- it must CALL base_force, not just write the total.
    // TODO: Open a main function.
    // TODO: Print two lines -- one showing base_force()'s value, one showing empowered()'s -- so both are cast.
    // TODO: Return 0 to seal the rite.
solution: |
  #include <iostream>

  int base_force() {
      return 4;
  }

  int empowered() {
      return base_force() + 6;
  }

  int main() {
      // [carved by the realm] The Forge weighs both moulds:
      std::cout << "base " << base_force() << "\n";
      std::cout << "empowered " << empowered() << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: base, text: "base 4" }
    - { type: stdout_contains, id: empowered, text: "empowered 10" }
    - type: source_matches
      id: composed
      regex: "empowered\\s*\\(\\s*\\)\\s*\\{[^}]*base_force\\s*\\("
      message: "The great spell must cast the small one. Inside empowered, speak base_force() by name."

hints:
  - trigger: "error:missing_return"
    message: "Both spells promise an int — each must return one."
  - trigger: "error:undeclared_identifier"
    message: "To cast a spell, speak its name with the mouth attached: base_force() — parentheses and all."
  - trigger: "check_failed:empowered"
    message: "empowered must yield exactly 10: the small spell's 4, plus the blessing of 6. Cast it: return base_force() + 6;"
  - trigger: "check_failed:composed"
    message: "The Keeper sees a bare number where a casting should be. Inside empowered: return base_force() + 6;"
  - trigger: "attempt:6"
    message: "The two forgings: int base_force() { return 4; }  and  int empowered() { return base_force() + 6; }"

rewards:
  xp: 100
  unlocks_zone_progress: true
