id: the-war-cry
kind: functions
zone: function_forge
act: 1
title: "The War Cry"
concept: functions_basics
concepts_required: [main_function, functions_basics]

teaching: |
  Until now, every working you have cast lived and died inside main.
  The Forge teaches a greater craft: a *function* — a working forged
  once, under its own name, cast whenever that name is spoken. The
  simplest kind promises nothing back. Its mark is `void`:

  ```cpp
  void herald_call() {
      std::cout << "The Forge is lit!" << std::endl;
  }
  ```

  Read the forging marks: `void` is the promise of nothing — this
  working *acts* instead of yielding. `herald_call` is its name. The
  `()` is the mouth of the spell, empty for now. Between `{` and `}`
  lies the deed itself. You forge the working; the Forge itself will
  speak its name and cast it. No `return` is needed — when the deed
  is done, the working simply ends.

examples:
  - prompt: "A void working may hold many deeds — each cast performs them all, in order:"
    code: |
      void sound_the_alarm() {
          std::cout << "To the walls!" << std::endl;
          std::cout << "Light the beacons!" << std::endl;
      }

narrative: |
  The Forge-master bars the door behind you. "Every {{class_name}}
  who works this Forge begins the same way: not with steel, but with
  voice. Forge me a war cry — a working the Forge can cast to hear
  who you are. It need yield nothing. It need only *ring*."

objective: |
  Forge a function named war_cry — promising void, taking nothing —
  whose deed is to print your war cry. The cry is yours to choose,
  but a true war cry ends with an exclamation mark.

prelude: |
    #include <iostream>

starter_code: |
      void war_cry() {
          // TODO: let the Forge hear you
      }

harness: forge_warcry_main.cpp

solution: |
      void war_cry() {
          std::cout << "For the Forge!" << std::endl;
      }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_matches, id: cry, regex: "\\S.*!" }

hints:
  - trigger: "error:missing_semicolon"
    message: "The cout cast inside your working still ends with ';' — the forging braces change nothing about that."
  - trigger: "check_failed:cry"
    message: "The Forge heard nothing that rings. Print at least one word, and end the cry with an exclamation mark: !"
  - trigger: "attempt:6"
    message: 'The whole forging: void war_cry() { std::cout << "For the Forge!" << std::endl; }'

rewards:
  xp: 75
  unlocks_zone_progress: true
