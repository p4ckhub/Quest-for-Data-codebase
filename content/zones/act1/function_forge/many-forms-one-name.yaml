id: many-forms-one-name
kind: program
zone: function_forge
act: 1
title: "Many Forms, One Name"
concept: function_overloading
concepts_required: [main_function, functions_basics, parameters, overloading]

teaching: |
  The Forge's final art: one name, many forms. Two spells may share a
  name so long as their *mouths* differ — different offerings, or a
  different count of them. The realm is never confused; it looks at
  what the caster brought and chooses the matching form:

  ```cpp
  int ward() {
      return 5;              // cast bare: ward()
  }

  int ward(int stones) {
      return stones * 5;     // cast with an offering: ward(3)
  }
  ```

  This is called *overloading*. Speak `ward()` with nothing and the
  first form answers; speak `ward(3)` and the second. What the realm
  refuses is two forms whose mouths are *identical* — same name, same
  offerings — for then it could never choose. Twins of the mouth are
  redefinition; siblings of the mouth are an art.

examples:
  - prompt: "The forms may differ in kind of offering, not only in count:"
    code: |
      int mend(int salve) {
          return salve + 1;
      }

      int mend(float essence) {
          return static_cast<int>(essence * 2.0f);
      }

narrative: |
  The Forge masters many forms. A single name — attack — can manifest
  in different ways. Learn to overload: same name, different signatures.
  The carved lines in main will cast both forms.

objective: |
  Forge two overloaded functions named attack, above main:
  1. attack() with no parameters, returns 7
  2. attack(int fury) with one int parameter, returns fury + 3
  The carved casts offer nothing, then 9 — and expect 7, then 12.

starter_code: |
    // TODO: Bring in the tool that lets you speak to the realm.
    // TODO: Forge int attack() with no parameters, returning the value the objective names.
    // TODO: Forge int attack(int fury) with one parameter, returning the objective's formula -- same name, different form.
    // TODO: Open a main function.
    // TODO: Print two lines -- one calling attack() bare, one calling attack with an offering -- so both forms are cast.
    // TODO: Return 0 to seal the rite.
solution: |
  #include <iostream>

  int attack() {
      return 7;
  }

  int attack(int fury) {
      return fury + 3;
  }

  int main() {
      // [carved by the realm] The Forge casts both forms:
      std::cout << "bare " << attack() << "\n";
      std::cout << "with 9: " << attack(9) << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: bare_form, text: "bare 7" }
    - { type: stdout_contains, id: offered_form, text: "with 9: 12" }

hints:
  - trigger: "error:redefinition"
    message: "You must use different signatures (different parameters) for overloading."
  - trigger: "error:missing_return"
    message: "Each function promising an int must return one."
  - trigger: "check_failed:offered_form"
    message: "The offered form takes int fury and yields fury + 3 — an offering of 9 must come back 12."
  - trigger: "attempt:6"
    message: 'Write two functions named attack with different parameter lists, both above main'

rewards:
  xp: 125
  unlocks_zone_progress: true

grants_spell:
  name: "attack"
  signature: "int attack()"
