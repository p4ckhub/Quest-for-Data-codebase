id: parameters-of-power
kind: program
zone: function_forge
act: 1
title: "Parameters of Power"
concept: function_parameters
concepts_required: [main_function, functions_basics, parameters]

teaching: |
  The mouth of a spell need not stay empty. A *parameter* is an
  offering the caster places into that mouth — a named crystal, born
  fresh at each cast, holding whatever the caster brought:

  ```cpp
  int braced(int shield) {
      return shield * 2;
  }
  ```

  Inside the braces, `shield` is a variable like any other — but its
  value is chosen by whoever casts the spell. Cast `braced(3)` and
  shield is born holding 3, so the yield is 6; cast `braced(10)` and
  the same working yields 20. One forging, endless offerings. The
  kind is declared in the mouth — `int shield` — because the Forge
  must know what manner of thing may be poured in.

examples:
  - prompt: "A mouth may take two offerings, parted by a comma — the caster supplies both, in order:"
    code: |
      int flank(int blade, int swiftness) {
          return blade + swiftness;
      }

narrative: |
 Power flows through your veins, but it must be directed. Learn to
 channel your fury with function parameters — each one a conduit of
 your {{class_name}}'s might. The carved lines in main will test your
 forging with two different offerings.

objective: |
  Complete strike_with so it returns fury + 5 as the damage. The fury
  parameter must be used in the return expression — the carved tests
  offer 5 and 10, and expect 10 and 15 back.

starter_code: |
  #include <iostream>

  int strike_with(int fury) {
      // TODO: Return fury + 5
      return 0;
  }

  int main() {
      // [carved by the realm] The Forge tests two offerings:
      std::cout << "with fury 5: " << strike_with(5) << "\n";
      std::cout << "with fury 10: " << strike_with(10) << "\n";
      return 0;
  }

solution: |
  #include <iostream>

  int strike_with(int fury) {
      return fury + 5;
  }

  int main() {
      // [carved by the realm] The Forge tests two offerings:
      std::cout << "with fury 5: " << strike_with(5) << "\n";
      std::cout << "with fury 10: " << strike_with(10) << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: low_offering, text: "with fury 5: 10" }
    - { type: stdout_contains, id: high_offering, text: "with fury 10: 15" }
    - type: source_matches
      id: fury_used
      regex: "return[^;]*fury"
      message: "The offering sits unused in the mouth. Work fury into the return expression."

hints:
  - trigger: "error:missing_return"
    message: "Your function promises to return an int — don't leave it empty."
  - trigger: "check_failed:fury_used"
    message: "The fury parameter isn't being used. Use it in your expression."
  - trigger: "check_failed:low_offering"
    message: "An offering of 5 must yield 10 — the fury, plus the Forge's 5."
  - trigger: "attempt:6"
    message: 'Use: return fury + 5; where fury is the function parameter'

rewards:
  xp: 100
  unlocks_zone_progress: true

grants_spell:
  name: "{{starter_spell}}_with"
  signature: "int strike_with(int fury)"
