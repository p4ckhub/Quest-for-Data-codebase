id: racks-of-the-armory
kind: program
zone: archive_armory
act: 1
title: "Racks of the Armory"
concept: arrays
concepts_required: [main_function, variables_and_types, for_loop, arrays]

narrative: |
  The Archive Armory holds its blades in fixed racks — four slots,
  carved in stone, no more and no less. An array is exactly that: one
  name, many numbered slots. The Quartermaster wants a tally of the
  edge-weights on rack one.

objective: |
  A variable  int total = 0;  is already declared. First declare an
  array of exactly 4 ints named blades holding the values 3, 7, 2, 8
  (in that order). Then use a for loop over its indices (0 through 3)
  to add every element to total. Done right, total is 20.

prelude: |
  #include "gameapi.h"
  int main() {
      int total = 0;

starter_code: |
      // TODO: declare  int blades[4]  with values {3, 7, 2, 8}
      // TODO: for each index 0..3, add blades[index] to total

epilogue: |
      gameapi::report("total", total);
      gameapi::report("first_blade", blades[0]);
      gameapi::report("last_blade", blades[3]);
      return 0;
      }

solution: |
      int blades[4] = {3, 7, 2, 8};
      for (int i = 0; i < 4; ++i) {
          total += blades[i];
      }

validation:
  checks:
    - { type: exit_status, id: exit_status, expect: clean }
    - { type: check_equals, id: total, expected: 20 }
    - { type: check_equals, id: first_blade, expected: 3 }
    - { type: check_equals, id: last_blade, expected: 8 }

hints:
  - trigger: "error:undeclared_identifier"
    message: "The rack must be named exactly blades — the Quartermaster's ledger reads it by name after your incantation."
  - trigger: "check_failed:total"
    message: "3+7+2+8 = 20. Arrays count from 0 — loop i from 0 while i < 4."
  - trigger: "check_failed:last_blade"
    message: "The fourth slot is blades[3], not blades[4] — slots count from zero."
  - trigger: "attempt:6"
    message: "The shape: int blades[4] = {3, 7, 2, 8}; then for (int i = 0; i < 4; ++i) total += blades[i];"

rewards:
  xp: 100
  unlocks_zone_progress: true
