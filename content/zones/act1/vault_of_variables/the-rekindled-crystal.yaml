id: the-rekindled-crystal
kind: program
zone: vault_of_variables
act: 1
title: "The Rekindled Crystal"
concept: assignment
concepts_required: [variables_and_types, assignment]

teaching: |
  The Vault splits a hair that matters for the rest of your life here.
  *Initialization* lights a crystal for the first time — kind, name,
  value, all at once. *Assignment* rekindles a crystal that already
  burns — name and new value only:

  ```cpp
  int sentries = 2;   // initialization: the crystal is born holding 2
  sentries = 5;       // assignment: the same crystal, rekindled to 5
  ```

  Never speak the kind twice. `int sentries = 5;` on the second line
  would try to birth a *second* crystal under the same name, and the
  Vault refuses twins — "redefinition," it will say, and mean it.
  Born once, changed freely: that is a variable's whole life.

examples:
  - prompt: "The Keeper rekindles a crystal three times without ever renaming it:"
    code: |
      int watch = 1;
      watch = 2;
      watch = 3;

narrative: |
  Two crystals sit on the rekindling stand. The lanterns crystal already
  burns — the Keeper lit it at 2 this morning, but the ledger demands 9
  by nightfall. Beside it, an unlit socket waits for a crystal of your
  own making: oaths, born holding 1, then rekindled to 3 — for the two
  you will swear before you leave this Vault.

objective: |
  The line lighting lanterns at 2 is carved by the realm; leave it be.
  Below it, assign lanterns 9 (no int, no redeclaring). Then initialize
  your own int named oaths with value 1, and assign it 3.

starter_code: |
  #include <iostream>

  int main() {
      // [carved by the realm] The Keeper lit this at dawn:
      int lanterns = 2;

      // Rekindle lanterns to 9, then birth oaths at 1 and rekindle it to 3

      // [carved by the realm] The Keeper reads the stand at nightfall:
      std::cout << "lanterns " << lanterns << "\n";
      std::cout << "oaths " << oaths << "\n";
      return 0;
  }

solution: |
  #include <iostream>

  int main() {
      // [carved by the realm] The Keeper lit this at dawn:
      int lanterns = 2;

      lanterns = 9;
      int oaths = 1;
      oaths = 3;

      // [carved by the realm] The Keeper reads the stand at nightfall:
      std::cout << "lanterns " << lanterns << "\n";
      std::cout << "oaths " << oaths << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: lanterns, text: "lanterns 9" }
    - { type: stdout_contains, id: oaths, text: "oaths 3" }
    - type: source_matches
      id: dawn_untouched
      regex: "int\\s+lanterns\\s*=\\s*2"
      message: "The dawn lighting is carved by the realm. Leave int lanterns = 2; as it stands."
    - type: source_matches
      id: no_twin
      regex: "int\\s+lanterns\\s*=\\s*9"
      expect_match: false
      message: "That births a twin. Rekindle the crystal that already burns: lanterns = 9;"

hints:
  - trigger: "error:redefinition"
    message: "The Vault refuses twins — lanterns already exists. Rekindle it without the kind: lanterns = 9;"
  - trigger: "error:undeclared_identifier"
    message: "oaths must be born before it can change: int oaths = 1; comes first."
  - trigger: "check_failed:lanterns"
    message: "The ledger demands lanterns end at exactly 9."
  - trigger: "attempt:6"
    message: "Three lines: lanterns = 9;  then int oaths = 1;  then oaths = 3;"

rewards:
  xp: 75
  unlocks_zone_progress: true
