id: essences-of-type
kind: program
zone: vault_of_variables
act: 1
title: "Essences of Type"
concept: type_safety
concepts_required: [bool, char, type_safety]

teaching: |
  Two more essences complete the Vault's first shelf. A `bool` crystal
  holds a single truth — it is `true` or it is `false`, with no third
  state and no bargaining. A `char` crystal holds exactly one character,
  carried in *single* quotes:

  ```cpp
  bool gate_sealed = false;
  char sigil = 'V';
  ```

  Mark the quotes with care, for the Vault does not forgive mixing them:
  `'V'` in single quotes is one char — a single carved mark. `"V"` in
  double quotes is a *string of words* that merely happens to be short,
  and it will not pour into a char crystal. One mark, single quotes;
  many marks, double quotes. Always.

  One more secret: when a truth crystal speaks through the voice, it
  sounds as a number — `1` for true, `0` for false.

examples:
  - prompt: "The Keeper sets a watch-pair — one truth, one mark:"
    code: |
      bool torch_lit = true;
      char rank = 'A';

narrative: |
  The Vault holds the purest essences: truth (bool), character (char),
  and their proper domains. Use types correctly, or risk corruption.
  The Keeper's reading at the bottom of the scroll will speak both
  crystals once they exist.

objective: |
  Above the Keeper's reading, declare and initialize: a bool named
  isAwake with value true, and a char named symbol with value 'X'.
  Leave the reading itself untouched.

starter_code: |
    // TODO: Bring in the tool that lets you speak to the realm.
    // TODO: Open a main function.
    // TODO: Declare a bool named isAwake with the value the objective names.
    // TODO: Declare a char named symbol with the value the objective names.
    // TODO: Leave the carved reading untouched.
    // TODO: Return 0 to seal the rite.
solution: |
  #include <iostream>

  int main() {
      bool isAwake = true;
      char symbol = 'X';

      // [carved by the realm] The Keeper reads the crystals aloud:
      std::cout << "awake " << isAwake << "\n";
      std::cout << "sigil " << symbol << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: is_awake, text: "awake 1" }
    - { type: stdout_contains, id: symbol, text: "sigil X" }
    - type: source_matches
      id: awake_is_bool
      regex: "bool\\s+isAwake"
      message: "The Vault demands isAwake be a bool crystal."
    - type: source_matches
      id: symbol_is_char
      regex: "char\\s+symbol"
      message: "The Vault demands symbol be a char crystal."

hints:
  - trigger: "error:type_mismatch"
    message: "You cannot assign a word to a single character. Use single quotes."
  - trigger: "error:missing_semicolon"
    message: "Each declaration must end with ';'"
  - trigger: "check_failed:symbol"
    message: "One mark, single quotes: 'X'"
  - trigger: "attempt:6"
    message: "bool isAwake = true;  char symbol = 'X';"

rewards:
  xp: 75
  unlocks_zone_progress: true
