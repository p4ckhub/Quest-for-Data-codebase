id: variables-101
kind: program
zone: vault_of_variables
act: 1
title: "Awakening Your Stats"
concept: variables_and_types
concepts_required: [main_function, cout, variables_and_types]

teaching: |
  The Vault teaches what the sandpit only whispered: a *variable* is a
  named crystal that holds one value — and every crystal has a *kind*,
  chosen the moment it is lit:

  ```cpp
  int arrows = 24;
  float draw_weight = 42.5f;
  ```

  `int` crystals hold whole numbers — counts, ranks, anything that never
  splits. `float` crystals hold numbers with a fractional flow, and their
  values are marked with a trailing `f` so the Vault knows the crystal's
  true kind. The ritual never changes: **kind, name, `=`, value, `;`** —
  and once lit, speaking the crystal's name yields what it holds.

examples:
  - prompt: "The Keeper lights a pair of its own:"
    code: |
      int wards = 9;
      float leak_rate = 0.25f;

narrative: |
  Three stat-crystals lie dark on the Vault floor. The Keeper's ledger
  records their true values: vitality 100, aether 50, and a stamina
  flow of 1.5. Speak their names and values to awaken them. The reading
  at the bottom of your scroll is carved by the realm; it will speak the
  crystals once they exist.

objective: |
  Above the Keeper's reading, declare and initialize: an int named hp
  with value 100, an int named mp with value 50, and a float named
  staminaRegen with value 1.5f. Leave the reading itself untouched.

starter_code: |
    // TODO: Bring in the tool that lets you speak to the realm.
    // TODO: Open a main function.
    // TODO: Declare an int named hp with the value the objective names.
    // TODO: Declare an int named mp with the value the objective names.
    // TODO: Declare a float named staminaRegen with the value the objective names.
    // TODO: Print the reading -- one labelled line for each value the objective checks.
    // TODO: Return 0 to seal the rite.
solution: |
  #include <iostream>

  int main() {
      int hp = 100;
      int mp = 50;
      float staminaRegen = 1.5f;

      // [carved by the realm] The Keeper reads the crystals aloud:
      std::cout << "hp " << hp << "\n";
      std::cout << "mp " << mp << "\n";
      std::cout << "stamina " << staminaRegen << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: hp, text: "hp 100" }
    - { type: stdout_contains, id: mp, text: "mp 50" }
    - { type: stdout_contains, id: stamina, text: "stamina 1.5" }
    - type: source_matches
      id: hp_is_int
      regex: "int\\s+hp"
      message: "The ledger demands hp be an int crystal."
    - type: source_matches
      id: stamina_is_float
      regex: "float\\s+staminaRegen"
      message: "The ledger demands staminaRegen be a float crystal."

hints:
  - trigger: "error:undeclared_identifier"
    message: "The Vault doesn't recognize that name yet — declare it before the crystal can hold it."
  - trigger: "error:missing_semicolon"
    message: "Your incantation trails off unfinished — each declaration must end with ';'"
  - trigger: "check_failed:hp"
    message: "The vitality crystal flickered but didn't hold — the ledger says hp must be exactly 100."
  - trigger: "attempt:6"
    message: "A declaration takes the form: type name = value;  — for example: int gold = 10;"

rewards:
  xp: 50
  unlocks_zone_progress: true
