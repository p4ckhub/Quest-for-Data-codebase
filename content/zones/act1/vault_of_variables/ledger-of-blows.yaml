id: ledger-of-blows
kind: program
zone: vault_of_variables
act: 1
title: "The Ledger of Blows"
concept: arithmetic
concepts_required: [variables_and_types, arithmetic]

teaching: |
  Crystals do not merely sit and glow — they *combine*. The Vault's four
  working-signs are `+`, `-`, `*` (multiply), and `/` (divide), and a new
  crystal can be born straight from the arithmetic of others:

  ```cpp
  int swords = 6;
  int shields = 4;
  int armory = swords + shields * 2;
  ```

  Read the last line as the Vault reads it: `*` binds before `+`, so the
  shields are doubled *first*, then joined to the swords — armory is born
  holding 14, not 20. When you need the addition first, say so with
  parentheses: `(swords + shields) * 2` makes 20. The signs keep their
  ancient order unless you overrule them.

examples:
  - prompt: "The Keeper tallies a night watch — division splits evenly between int crystals, dropping any remainder:"
    code: |
      int guards = 9;
      int gates = 2;
      int per_gate = guards / gates;   // 4 -- the ninth guard sleeps

narrative: |
  The Keeper's ledger computes what a {{class_name}}'s blow is truly
  worth. Your might and swiftness are already entered — str at 8, agi
  at 5, carved into the page. The old formula is carved above them:
  a blow is might doubled, plus swiftness. Enter it, and let the
  ledger tally itself.

objective: |
  The carved lines give you str (8) and agi (5). Initialize an int
  named blow with the value of str * 2 + agi — computed from the
  variables themselves, not written as a bare number.

starter_code: |
    // TODO: Bring in the tool that lets you speak to the realm.
    // TODO: Open a main function.
    // TODO: Declare the two ints the objective works from -- str and agi -- with the values it names.
    // TODO: Initialize an int named blow from the objective's formula, computed from the variables, not a bare number.
    // TODO: Print the tally -- a labelled line showing the value you computed.
    // TODO: Return 0 to seal the rite.
solution: |
  #include <iostream>

  int main() {
      // [carved by the realm] The ledger's standing entries:
      int str = 8;
      int agi = 5;

      int blow = str * 2 + agi;

      // [carved by the realm] The ledger tallies aloud:
      std::cout << "blow " << blow << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: blow, text: "blow 21" }
    - type: source_matches
      id: entries_untouched
      regex: "int\\s+str\\s*=\\s*8"
      message: "The standing entries are carved by the realm. str stays at 8."
    - type: source_matches
      id: true_formula
      regex: "blow\\s*=[^;]*str"
      message: "The ledger computes from the crystals themselves. Build blow from str and agi, not a bare number."

hints:
  - trigger: "error:undeclared_identifier"
    message: "str and agi already burn on the stand — use those exact names in your formula."
  - trigger: "check_failed:blow"
    message: "The formula, in the ledger's own signs: str * 2 + agi — the doubling binds first, then the sum. It should tally to 21."
  - trigger: "check_failed:true_formula"
    message: "Writing 21 by hand teaches the ledger nothing. Compute it: str * 2 + agi"
  - trigger: "attempt:6"
    message: "One line births the crystal from the others: int blow = str * 2 + agi;"

rewards:
  xp: 75
  unlocks_zone_progress: true
