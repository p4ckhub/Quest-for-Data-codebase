id: second-entry-cinder-bat
kind: functions
zone: the_bestiary
act: 1
title: "Second Entry: the Cinder Bat"
concept: polymorphism
concepts_required: [inheritance, polymorphism]

narrative: |
  Look closely at the summoning circle: it has not changed since the
  Ash Wolf. Not one rune. It calls species(), attack(), max_hp() on a
  Monster — and whichever form stands in the circle answers with its
  own nature. This is polymorphism: one call, many answers. Prove it
  by writing a beast as unlike the wolf as you can.

objective: |
  Define a class CinderBat that inherits publicly from Monster:
    std::string species() const — returns exactly "Cinder Bat"
    int attack()                — returns 4 (quick, but light)
    int max_hp() const          — returns 18
  The circle that summons it is byte-for-byte the one that summoned
  the wolf — only your class differs.

prelude: |
  #include "gameapi.h"
  #include "monsters.h"
  #include <string>

starter_code: ""
epilogue: |
  REGISTER_MONSTER("cinder_bat", CinderBat)

solution: |
  class CinderBat : public Monster {
  public:
      std::string species() const override {
          return "Cinder Bat";
      }
      int attack() override {
          return 4;
      }
      int max_hp() const override {
          return 18;
      }
  };

harness: bestiary_main.cpp

validation:
  checks:
    - { type: exit_status, id: exit_status, expect: clean }
    - { type: check_equals, id: registered, expected: 1 }
    - { type: check_equals, id: species, expected: "Cinder Bat" }
    - { type: check_equals, id: max_hp, expected: 18 }
    - { type: check_equals, id: attack_min, expected: 4 }
    - { type: check_equals, id: attack_max, expected: 4 }
    - { type: event_emitted, event_type: log }

hints:
  - trigger: "check_failed:species"
    message: "species() must return exactly \"Cinder Bat\" — the circle reads the name letter by letter."
  - trigger: "check_failed:max_hp"
    message: "A bat is frail: max_hp() returns 18. Remember the const after the parentheses — it must match the base form's."
  - trigger: "error:undeclared_identifier"
    message: "The registration line below your code names the class CinderBat — one word, capital C, capital B."
  - trigger: "attempt:6"
    message: "Copy the Ash Wolf's shape, change its nature: class CinderBat : public Monster with species \"Cinder Bat\", attack 4, max_hp 18."

rewards:
  xp: 150
  unlocks_zone_progress: true
