id: the-enraged-form
kind: functions
zone: the_bestiary
act: 1
title: "The Enraged Form"
concept: virtual_dispatch
concepts_required: [inheritance, polymorphism, virtual_dispatch]

narrative: |
  The base Monster offers one more virtual rune: on_hit, called each
  time the beast takes a blow. Most forms ignore it. The Grave Troll
  does not — every wound feeds its rage, and its next blow lands
  harder. The circle will strike your troll once, then measure what
  the striking made.

objective: |
  Define a class GraveTroll that inherits publicly from Monster, with a
  private int member rage starting at 0, and:
    std::string species() const — returns exactly "Grave Troll"
    int max_hp() const          — returns 40
    int attack()                — returns 6 + rage
    void on_hit(int amount)     — adds amount / 2 to rage
  The circle strikes for 10 after five calm attacks — the sixth attack
  should land for 11.

prelude: |
  #include "gameapi.h"
  #include "monsters.h"
  #include <string>

starter_code: |
  // TODO: class GraveTroll : public Monster { ... };
  // Private: int rage = 0;
  // Override species(), max_hp(), attack(), and on_hit(int amount).

epilogue: |
  REGISTER_MONSTER("grave_troll", GraveTroll)

solution: |
  class GraveTroll : public Monster {
  private:
      int rage = 0;
  public:
      std::string species() const override {
          return "Grave Troll";
      }
      int max_hp() const override {
          return 40;
      }
      int attack() override {
          return 6 + rage;
      }
      void on_hit(int amount) override {
          rage += amount / 2;
      }
  };

harness: bestiary_main.cpp

validation:
  checks:
    - { type: exit_status, id: exit_status, expect: clean }
    - { type: check_equals, id: species, expected: "Grave Troll" }
    - { type: check_equals, id: max_hp, expected: 40 }
    - { type: check_equals, id: attack_min, expected: 6 }
    - { type: check_equals, id: attack_max, expected: 6 }
    - { type: check_equals, id: post_hit_attack, expected: 11 }
    - { type: event_emitted, event_type: log }

hints:
  - trigger: "check_failed:attack_max"
    message: "Before any blow lands, rage is 0 — so all five opening attacks should be exactly 6. Don't let rage start above zero."
  - trigger: "check_failed:post_hit_attack"
    message: "The circle strikes for 10; half of that feeds the rage. 6 + 10/2 = 11. Check on_hit adds amount / 2, and attack returns 6 + rage."
  - trigger: "error:undeclared_identifier"
    message: "rage lives inside the class: private: int rage = 0; — then attack() and on_hit() may both touch it."
  - trigger: "attempt:6"
    message: "The hook: void on_hit(int amount) override { rage += amount / 2; } — the base calls it for you when the blow lands."

rewards:
  xp: 175
  unlocks_zone_progress: true
