id: drill-signs-of-power
kind: program
zone: sandpit
act: 1
title: "Drill: Signs of Power"
concept: arithmetic
concepts_required: [variables_and_types, arithmetic]

teaching: |
  The order, once more: parentheses first, then `*` and `/`, then `+`
  and `-`. Parentheses bend the order, and bending changes the answer:

  ```cpp
  fury + calm * 2     // calm doubles first
  (fury + calm) * 2   // the sum doubles instead
  ```

narrative: |
  The Forerunner scratches two numbers in the sand, fury 4 and calm 3.
  "Same sigils, two truths. Show me both."

objective: |
  Below the carved crystals, proclaim two lines: unbent followed by
  fury + calm * 2, then bent followed by (fury + calm) * 2. Let the
  sigils do the work.

starter_code: ""
solution: |
  #include <iostream>

  int main() {
      // [carved by the realm] The drill's crystals, already lit:
      int fury = 4;
      int calm = 3;

      std::cout << "unbent " << fury + calm * 2 << "\n";
      std::cout << "bent " << (fury + calm) * 2 << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: unbent, text: "unbent 10" }
    - { type: stdout_contains, id: bent, text: "bent 14" }
    - type: source_matches
      id: parens_bend
      regex: "\\(\\s*fury\\s*\\+\\s*calm\\s*\\)\\s*\\*\\s*2"
      message: "The second reading must bend the order with parentheses: (fury + calm) * 2"
    - type: source_matches
      id: no_carved_answers
      regex: "10|14"
      expect_match: false
      message: "Let the sigils do the work. Do not carve 10 or 14 into the scroll yourself."

hints:
  - trigger: "check_failed:unbent"
    message: "Unbent means the arithmetic order rules: * before +. The realm resolves fury + calm * 2 as fury + (calm * 2)."
  - trigger: "check_failed:parens_bend"
    message: "Bend the order so the sum happens first: (fury + calm) * 2"
  - trigger: "attempt:6"
    message: 'Two casts: std::cout << "unbent " << fury + calm * 2 << "\n"; and std::cout << "bent " << (fury + calm) * 2 << "\n";'

rewards:
  xp: 0
  unlocks_zone_progress: false
