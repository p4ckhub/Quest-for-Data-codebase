id: sandpit-the-first-words
kind: program
zone: sandpit
act: 1
title: "The First Words"
concept: cout
concepts_required: [cout]

teaching: |
  *The figure kneeling beside you wears your own face, aged a thousand
  lifetimes. When it speaks, the sand itself listens.*

  **THE FORERUNNER:** "In this realm, will becomes word through a *cast* —
  a single spoken line. Watch. This is how I say the simplest true thing
  I know:"

  ```cpp
  std::cout << "The sand is warm." << std::endl;
  ```

  "Read it as I read it, long ago. `std::cout` is the voice itself. `<<` is
  the channel that carries what follows out into the world. Your words travel
  held in quotes — `"like this"` — so the realm knows where speech begins and
  ends. `std::endl` is the breath that ends the utterance. And the `;` seals
  the cast. An unsealed cast is no cast at all. I have watched armies fall
  for a missing semicolon."

examples:
  - prompt: "The Forerunner casts again, softer:"
    code: |
      std::cout << "I have been here before." << std::endl;
  - prompt: "And once more — the voice can carry numbers as easily as words:"
    code: |
      std::cout << 1000 << std::endl;

narrative: |
  You wake on warm sand with no memory of arriving, and no voice — your
  mouth moves and nothing comes. The being beside you waits with the
  patience of something that has waited far longer than this. "Your voice
  isn't gone," it says. "It has simply never been cast. Speak the words
  *I am awake* — exactly so — and the realm will hear you."

objective: |
  Use std::cout to speak your first words. Print exactly: I am awake

prelude: |
    #include "gameapi.h"
    #include <iostream>
    int main() {
        std::cout << "[?] Easy now. Speak: I am awake" << std::endl;

starter_code: |
        // Cast your first words below

epilogue: |
        std::cout << "[The Forerunner] There. Your first cast. The realm heard you -- I felt it turn its head." << std::endl;
        std::cout << "[The Forerunner] I am called the Forerunner. I have won wars you will never read of, and lost more than I won. I did not come back through all those ages to hand you power. I came to wake what was already in you." << std::endl;
        std::cout << "[The Forerunner] The realm is quieter than it should be. Something is wrong at its foundations. So we begin with foundations." << std::endl;
        gameapi::report("awake", 1);
        return 0;
        }

solution: |
        std::cout << "I am awake" << std::endl;

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: spoke, text: "I am awake" }
    - { type: check_equals, id: awake, expected: 1 }

hints:
  - trigger: "error:missing_semicolon"
    message: "The cast trails off unsealed — end the line with ';'"
  - trigger: "error:undeclared_identifier"
    message: "Words must travel held in quotes: \"I am awake\" — bare words the realm mistakes for names it doesn't know."
  - trigger: "check_failed:spoke"
    message: "The realm listens for those exact words: I am awake — capital I, nothing more, nothing less."
  - trigger: "attempt:2"
    message: "Shape it like the Forerunner's own cast: std::cout << \"I am awake\" << std::endl;"

rewards:
  xp: 0
  unlocks_zone_progress: true
