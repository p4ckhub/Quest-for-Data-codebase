id: drill-the-doubling-rite
kind: program
zone: sandpit
act: 1
title: "Drill: The Doubling Rite"
concept: program_composition
concepts_required: [variables_and_types, arithmetic, cin_input]

teaching: |
  The rite, once more: prompt, catch, compute at the point of use.
  The offering leaves unharmed:

  ```cpp
  std::cin >> paces;
  std::cout << "Twice " << paces << " is " << paces * 2 << '\n';
  ```

narrative: |
  The Forerunner draws an empty circle in the sand. "The whole rite,
  alone this time: ask, catch, and speak the double back."

objective: |
  Build the full rite: proclaim the prompt Name your paces: then catch
  an int offering named paces from the wind, then proclaim one line
  reading Twice N is 2N. Double it inside the cast and never overwrite
  paces.

starter_code: ""
solution: |
  #include <iostream>

  int main() {
      std::cout << "Name your paces: ";
      int paces{};
      std::cin >> paces;
      std::cout << "Twice " << paces << " is " << paces * 2 << '\n';
      return 0;
  }

stdin_fixture: "6"

validation:
  checks:
    - { type: exit_status, expect: clean }
    - { type: stdout_contains, id: prompt, text: "Name your paces" }
    - { type: stdout_matches, id: doubled, regex: "Twice 6 is 12" }
    - type: source_matches
      id: inline_doubling
      regex: "<<[^;]*(paces\\s*\\*\\s*2|2\\s*\\*\\s*paces)"
      message: "Do the doubling inside the cast itself: << paces * 2"
    - type: source_matches
      id: offering_unharmed
      regex: "paces\\s*=\\s*paces"
      expect_match: false
      message: "The offering must leave unharmed. Do not scribble over paces; compute at the point of use."
    - type: source_matches
      id: no_carved_answer
      regex: "12"
      expect_match: false
      message: "Let the rite do the doubling. Do not carve 12 into the scroll yourself."

hints:
  - trigger: "error:undeclared_identifier"
    message: "Bind the crystal before the wind can fill it: int paces{}; then std::cin >> paces;"
  - trigger: "check_failed:inline_doubling"
    message: "No scratch crystals and no overwriting. Put the formula in the cast: << paces * 2"
  - trigger: "attempt:6"
    message: "Four deeds: prompt cast, int paces{};, std::cin >> paces;, then std::cout << \"Twice \" << paces << \" is \" << paces * 2 << '\\n';"

rewards:
  xp: 0
  unlocks_zone_progress: false
