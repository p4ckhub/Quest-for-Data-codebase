id: drill-the-returned-gift
kind: program
zone: sandpit
act: 1
title: "Drill: The Returned Gift"
concept: return_values
concepts_required: [main_function, functions_basics]

teaching: |
  Once more: the mark before the name is a promise, and return keeps
  it in one breath: work it out, hand back a copy, end the spell.

  ```cpp
  int paces() {
      return 9;
  }
  ```

narrative: |
  The Forerunner hands you a scroll that swears an int and gives
  nothing. "Cast it, watch it collapse, then mend it: the gift is 9."

objective: |
  Cast the scroll once and witness the broken promise. Then mend
  paces to return 9. The carved casts read the gift bare, then feed
  it into an expression with 2.

starter_code: |
    // TODO: Bring in the tool that lets you speak to the realm.
    // TODO: Forge int paces() to hand back the value the drill demands.
    // TODO: Open a main function.
    // TODO: Print two lines -- the gift bare, then the gift worked into an expression with two.
    // TODO: Return 0 to seal the rite.
solution: |
  #include <iostream>

  int paces() {
      return 9;
  }

  int main() {
      // [carved by the realm] The drill weighs the gift, bare and worked:
      std::cout << "gift " << paces() << "\n";
      std::cout << "gift and two " << paces() + 2 << "\n";
      return 0;
  }

validation:
  checks:
    - { type: exit_status, id: survives, expect: clean }
    - { type: stdout_matches, id: gift, regex: "gift 9\\ngift and two 11" }
    - type: source_matches
      id: promise_kept
      regex: "int\\s+paces\\s*\\(\\s*\\)\\s*\\{[^}]*return"
      message: "Keep the promise with a return statement inside paces."

hints:
  - trigger: "check_failed:survives"
    message: "The promise broke and the working collapsed. Return the gift: return 9; inside paces."
  - trigger: "check_failed:gift"
    message: "The drill expects gift 9, then gift and two 11. Return exactly 9."
  - trigger: "attempt:6"
    message: "int paces() { return 9; }"

rewards:
  xp: 0
  unlocks_zone_progress: false
